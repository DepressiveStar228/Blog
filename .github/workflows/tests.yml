name: CI/CD Pipeline (Unit, Robot & E2E Tests)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Static Code Analysis (SpotBugs)
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:check

      - name: Run Unit Tests and Build Project
        run: mvn clean package

      - name: Start Spring Boot Application
        run: java -jar target/blog-0.0.1-SNAPSHOT.jar &

      - name: Wait for application to start
        run: sleep 15

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Selenium Side Runner
        run: |
          npm install -g selenium-side-runner

      - name: Run Selenium IDE tests
        run: >
          selenium-side-runner src/test/java/com/example/blog/e2e_tests/Blog.side 
          -c "browserName=chrome goog:chromeOptions.args=[--headless,--no-sandbox,--disable-dev-shm-usage]"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Robot Framework
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-seleniumlibrary

      - name: Run Robot Framework Tests
        run: >
          robot 
          --variable BROWSER:headlesschrome 
          --outputdir robot_reports 
          src/test/java/com/example/blog/robot_tests/blog_tests.robot

      - name: Upload Robot Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-test-reports
          path: robot_reports/