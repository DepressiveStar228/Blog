name: CI/CD Pipeline (Unit & E2E Tests)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests and Build Project
        run: mvn clean package

      - name: Start Spring Boot Application
        run: java -jar target/blog-0.0.1-SNAPSHOT.jar &

      - name: Wait for application to start
        run: sleep 15

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Selenium Side Runner
        run: |
          npm install -g selenium-side-runner
          npm install -g chromedriver

      - name: Run Selenium IDE tests
        run: >
          selenium-side-runner src/test/java/com/example/blog/e2e_tests/Blog.side 
          -c "browserName=chrome goog:chromeOptions.args=[--headless,--no-sandbox,--disable-dev-shm-usage]"