<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Скид пароля</title></head>
<body>
<h2>Забув пароль</h2>

<div th:if="${success}" th:text="${success}" style="color:green"></div>

<form th:action="@{/forgot-password}" method="post">
    <div>
        <label>Email</label>
        <input type="email" name="email" />
    </div>
    <button type="submit">Відпавити посилання</button>
</form>

<a th:href="@{/login}">Назад</a>
</body>
</html>
