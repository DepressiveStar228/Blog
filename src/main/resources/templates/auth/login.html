<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Вхід</title></head>
<body>
<h2>Вхід</h2>

<div th:if="${param.error}" style="color:red">Неправильний email або пароль</div>
<div th:if="${success}" th:text="${success}" style="color:green"></div>

<form th:action="@{/login}" method="post">
    <div>
        <label>Email</label>
        <input type="email" name="username" />
    </div>
    <div>
        <label>Пароль</label>
        <input type="password" name="password" />
    </div>
    <button type="submit">Ввійти</button>
</form>

<a th:href="@{/forgot-password}">Забув пароль</a>
</body>
</html>
