<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Пост</title></head>
<body>

<h2 th:text="${post.id == null} ? 'Новий пост' : 'Редагувати пост'"></h2>

<form th:action="${post.id == null} ? @{/posts/new} : @{/posts/{id}/edit(id=${post.id})}"
      th:object="${post}" method="post">

    <div>
        <label>Заголовок</label>
        <input type="text" th:field="*{title}" required />
    </div>
    <div>
        <label>Текст</label>
        <textarea th:field="*{content}" rows="10" required></textarea>
    </div>
    <button type="submit">Зберегти</button>
    <a th:href="@{/posts}">Скасувати</a>
</form>

</body>
</html>
