<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Блог</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
            color: #222;
        }

        header nav {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header nav a {
            text-decoration: none;
            color: #555;
            font-size: 0.95rem;
        }

        header nav a:hover { color: #222; }

        .btn {
            background: #222;
            color: #fff !important;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .btn:hover { background: #444; }

        .btn-outline {
            background: transparent;
            color: #222 !important;
            border: 1px solid #ccc;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .btn-outline:hover { border-color: #222; }

        .container {
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .flash {
            background: #e6f4ea;
            color: #2d6a4f;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        .post-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            transition: box-shadow 0.2s;
        }

        .post-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .post-card h2 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .post-card h2 a {
            text-decoration: none;
            color: #222;
        }

        .post-card h2 a:hover { color: #555; }

        .post-meta {
            font-size: 0.82rem;
            color: #999;
            margin-bottom: 12px;
        }

        .post-meta a {
            color: #666;
            text-decoration: none;
            font-weight: 500;
        }

        .post-meta a:hover { text-decoration: underline; }

        .post-excerpt {
            color: #444;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .empty {
            text-align: center;
            padding: 60px 0;
            color: #aaa;
        }

        .empty p { margin-bottom: 16px; font-size: 1rem; }
    </style>
</head>
<body>

<header>
    <a class="logo" th:href="@{/posts}">📝 Блог</a>
    <nav>
        <a class="btn-outline"
           sec:authorize="isAuthenticated()"
           th:href="@{/profile/me}">Мій кабінет</a>

        <a class="btn"
           sec:authorize="isAuthenticated()"
           th:href="@{/posts/new}">+ Новий пост</a>

        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" onclick="return confirm('Вийти з акаунту?')"
                    style="background:none; border:none; color:#999; font-size:0.85rem; cursor:pointer;">
                Вийти
            </button>
        </form>

        <a class="btn-outline"
           sec:authorize="!isAuthenticated()"
           th:href="@{/login}">Увійти</a>

        <a class="btn"
           sec:authorize="!isAuthenticated()"
           th:href="@{/register}">Реєстрація</a>
    </nav>
</header>

<div class="container">
    <h1 class="page-title">Останні пости</h1>
    <p class="page-subtitle">Читай, пиши, коментуй</p>

    <div th:if="${success}" class="flash" th:text="${success}"></div>

    <div th:each="post : ${posts}" class="post-card">
        <h2>
            <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}"></a>
        </h2>
        <div class="post-meta">
            <a th:href="@{/profile/{u}(u=${post.author.username})}"
               th:text="${post.author.username}"></a>
            &nbsp;·&nbsp;
            <span th:text="${#temporals.format(post.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
        </div>
        <p class="post-excerpt" th:text="${#strings.abbreviate(post.content, 200)}"></p>
    </div>

    <div th:if="${#lists.isEmpty(posts)}" class="empty">
        <p>Поки що немає жодного поста.</p>
        <a class="btn" th:href="@{/posts/new}" sec:authorize="isAuthenticated()">
            Написати перший пост
        </a>
        <a class="btn" th:href="@{/register}" sec:authorize="!isAuthenticated()">
            Зареєструватись і написати
        </a>
    </div>
</div>

</body>
</html>
